<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5;}
.header{background:white;padding:30px;text-align:center;border-bottom:3px solid #006341;}
.header h1{color:#006341;font-size:60px;margin:0;letter-spacing:5px;}
.header p{color:#666;margin-top:10px;font-size:18px;}
.banner{background:linear-gradient(90deg,#004d40,#006341);color:white;text-align:center;padding:25px;font-size:32px;font-weight:bold;}
.contenedor{max-width:1000px;margin:30px auto;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.tarjeta{background:white;border:1px solid #ccc;padding:25px;border-radius:5px;}
.tarjeta h2{color:#006341;margin-top:0;}
.footer{margin-top:40px;background:#006341;color:white;text-align:center;padding:20px;}
</style>
</head>
<body>
<div class="header">
<h1>SAT</h1>
<p>Servicio de Administración Tributaria</p>
</div>
<div class="banner">SAT</div>
<div class="contenedor">
<div class="tarjeta">
<h2>Información Fiscal</h2>
<p><strong>Estado:</strong> Activo</p>
<p><strong>Tipo:</strong> Persona Moral</p>
<p><strong>Régimen:</strong> General</p>
</div>
<div class="tarjeta">
<h2>Datos Generales</h2>
<p><strong>RFC:</strong> SAT000000XXX</p>
<p><strong>Fecha:</strong> 2026</p>
<p><strong>Folio:</strong> SAT-2026-000001</p>
</div>
</div>
<div class="footer">SAT - Servicio de Administración Tributaria</div>
</body>
</html>
